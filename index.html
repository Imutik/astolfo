<script>
const user = window.location.hostname.split('.')[0], repo = 'astolfo';
fetch(`https://github.com{user}/${repo}/contents/`)
  .then(res => res.json())
  .then(data => {
    const png = data.filter(f => f.name.toLowerCase().endsWith('.png'));
    const rand = Math.floor(Math.random() * png.length) + 1;
    fetch(`https://githubusercontent.com{user}/${repo}/main/${rand}.png`)
      .then(res => res.blob())
      .then(blob => {
        const fr = new FileReader();
        fr.onloadend = () => window.location.replace(fr.result);
        fr.readAsDataURL(blob);
      });
  });
</script>

<script>
const u = window.location.hostname.split('.')[0], r = 'astolfo';
fetch(`https://github.com{u}/${r}/contents/`)
  .then(res => res.json())
  .then(d => {
    const p = d.filter(f => f.name.toLowerCase().endsWith('.png'));
    const img = `https://githubusercontent.com{u}/${r}/main/${Math.floor(Math.random() * p.length) + 1}.png`;
    fetch(img).then(res => res.blob()).then(b => {
      const fr = new FileReader(); fr.onloadend = () => window.location.replace(fr.result); fr.readAsDataURL(b);
    });
  });
</script>

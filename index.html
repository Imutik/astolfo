<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Astolfo Random</title>
  <style>
    body { background: #1a0e0e; color: #f5b0b0; font: 1.2rem sans-serif; text-align: center; padding-top: 20vh; }
    .ok { color: #8f8; }
  </style>
</head>
<body>
  <h1>🎀 Астольфо активирован</h1>
  <p>Service Worker зарегистрирован.</p>
  <p id="status" class="ok">⏳ Регистрация...</p>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => document.getElementById('status').textContent = '✅ Готово!')
        .catch(e => document.getElementById('status').textContent = '❌ Ошибка: ' + e);
    } else {
      document.getElementById('status').textContent = '❌ Браузер не поддерживает SW';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Astolfo Redirect Server</title>
    <script>
        (function() {
            let count = 0;

            // Локально проверяем, сколько картинок (1.png, 2.png...) есть в папке
            function checkImages(num) {
                const img = new Image();
                img.src = `/astolfo/${num}.png`;
                
                img.onload = function() {
                    count++;
                    checkImages(num + 1); // Если нашли, проверяем следующую
                };
                
                img.onerror = function() {
                    // Папка закончилась! Выбираем случайное число из найденных
                    if (count > 0) {
                        const randomNum = Math.floor(Math.random() * count) + 1;
                        
                        // СТРОИМ ПРЯМУЮ RAW ССЫЛКУ НА ФАЙЛ
                        const rawUrl = `https://raw.githubusercontent.com/Imutik/astolfo/refs/heads/main/{randomNum}.png`;
                        
                        // Моментально перенаправляем браузер прямо на этот raw-файл
                        window.location.replace(rawUrl);
                    } else {
                        // Резервный план на случай сбоя
                        window.location.replace(`https://githubusercontent.com`);
                    }
                };
            }

            checkImages(1);
        })();
    </script>
</head>
<body></body>
</html>

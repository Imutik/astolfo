<!DOCTYPE html>
<html>
<head>
    <script>
        (function() {
            let count = 0;

            // Функция по очереди проверяет существование файлов 1.png, 2.png...
            function checkNextImage(num) {
                const img = new Image();
                // Проверяем картинку прямо в твоей папке astolfo
                img.src = `/astolfo/${num}.png`;
                
                img.onload = function() {
                    count++;
                    checkNextImage(num + 1); // Если картинка есть, проверяем следующую
                };
                
                img.onerror = function() {
                    // Как только наткнулись на ошибку — папка закончилась!
                    // Пересчитываем рандом из того количества, что успели найти
                    if (count > 0) {
                        const randomNum = Math.floor(Math.random() * count) + 1;
                        
                        // Скачиваем выбранный случайный арт в поток байт для CSS
                        fetch(`/astolfo/${randomNum}.png`)
                            .then(res => res.blob())
                            .then(blob => {
                                const fileReader = new FileReader();
                                fileReader.onloadend = function() {
                                    window.location.replace(fileReader.result);
                                };
                                fileReader.readAsDataURL(blob);
                            });
                    }
                };
            }

            // Запускаем автоматический подсчет с первой картинки
            checkNextImage(1);
        })();
    </script>
</head>
<body></body>
</html>
